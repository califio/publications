<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" width="980" height="620">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b2b2b"/>
    </marker>
    <style>
      .box   { fill: #fafafa; stroke: #2b2b2b; stroke-width: 1.5; rx: 4; }
      .focal { fill: #eef4ff; stroke: #1e4d8c; stroke-width: 2;   rx: 4; }
      .tv    { fill: #fff8ec; stroke: #8a5a00; stroke-width: 1.5; rx: 4; }
      .edge  { fill: none; stroke: #2b2b2b; stroke-width: 1.5;
               marker-end: url(#arrow); }
      .feedback { fill: none; stroke: #1e4d8c; stroke-width: 1.5;
                  stroke-dasharray: 5 4; marker-end: url(#arrow); }
      text   { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
               font-size: 13px; fill: #1a1a1a; }
      .num   { font-weight: 700; fill: #1e4d8c; }
      .code  { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
               fill: #6b3b00; }
    </style>
  </defs>

  <!-- ─────────── boxes ─────────── -->

  <!-- [4] KantS2 source release -->
  <rect class="box" x="370" y="20" width="240" height="56"/>
  <text x="490" y="44" text-anchor="middle">
    <tspan class="num">[4]</tspan> Matching KantS2
  </text>
  <text x="490" y="62" text-anchor="middle">source release</text>

  <!-- We / operator -->
  <rect class="box" x="40" y="160" width="200" height="56"/>
  <text x="140" y="193" text-anchor="middle">We / operator</text>

  <!-- Codex (focal) -->
  <rect class="focal" x="370" y="155" width="240" height="66"/>
  <text x="490" y="195" text-anchor="middle"
        font-size="17" font-weight="700" fill="#1e4d8c">Codex</text>

  <!-- [2] Controller host -->
  <rect class="box" x="700" y="160" width="240" height="56"/>
  <text x="820" y="184" text-anchor="middle">
    <tspan class="num">[2]</tspan> Controller host
  </text>
  <text x="820" y="202" text-anchor="middle">ARM build + stage</text>

  <!-- [3] tmux shell listener -->
  <rect class="box" x="700" y="300" width="240" height="56"/>
  <text x="820" y="324" text-anchor="middle">
    <tspan class="num">[3]</tspan> tmux shell listener
  </text>
  <text x="820" y="342" text-anchor="middle">for the TV session</text>

  <!-- [1][5][6] Samsung TV (wide) -->
  <rect class="tv" x="240" y="460" width="700" height="100"/>
  <text x="266" y="488">
    <tspan class="num">[1]</tspan> Browser-context shell on the Samsung TV
  </text>
  <text x="266" y="512">
    <tspan class="num">[5]</tspan> Static Armv7 binaries + UEP restrictions
  </text>
  <text x="266" y="536">
    <tspan class="num">[6]</tspan> <tspan class="code">memfd</tspan> wrapper for unsigned binaries
  </text>

  <!-- ─────────── edges ─────────── -->

  <!-- [4] -> Codex -->
  <path class="edge" d="M 490 76  L 490 155"/>

  <!-- We / operator -> Codex -->
  <path class="edge" d="M 240 188 L 370 188"/>

  <!-- Codex -> [2] Controller -->
  <path class="edge" d="M 610 188 L 700 188"/>

  <!-- [2] Controller -> [3] tmux -->
  <path class="edge" d="M 820 216 L 820 300"/>

  <!-- [3] tmux -> TV box -->
  <path class="edge" d="M 820 356 L 820 460"/>

  <!-- [3] tmux -> Codex  (feedback loop, dashed) -->
  <path class="feedback"
        d="M 700 328
           L 490 328
           L 490 221"/>

</svg>
