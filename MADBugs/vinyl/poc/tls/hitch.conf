# hitch configuration for Groove Therapy.
#
# ALPN advertises both h2 and http/1.1 so browsers negotiate real HTTP/2.
# The decrypted stream is forwarded to Varnish on :6086 with a PROXY v2
# preamble; Varnish's :6086 listener is configured with the PROXY protocol
# hint so it strips the preamble and hands the remaining bytes to its
# HTTP/2 handler just as it would for a cleartext :80 connection.
frontend = {
    host = "*"
    port = "443"
}

backend          = "[varnish]:6086"
alpn-protos      = "h2, http/1.1"
pem-file         = "/etc/hitch/groove-therapy.local.pem"
write-proxy-v2   = on
workers          = 2
backlog          = 100
keepalive        = 3600
user             = "_hitch"
group            = "_hitch"
daemon           = off
syslog           = off
log-level        = 1
