<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 220" font-family="ui-monospace, Menlo, monospace">
  <style>
    .title { font-size: 15px; font-weight: 700; fill: #222; }
    .h2    { font-size: 12px; font-weight: 600; fill: #333; }
    .lbl   { font-size: 10px;  fill: #555; }
    .fld   { font-size: 11px; fill: #333; }
    .off   { font-size: 10px;  fill: #555; font-weight: 600; }
    .keyoff{ font-size: 10px;  fill: #5e35b1; font-weight: 700; }
  </style>

  <text x="470" y="22" text-anchor="middle" class="title">Spray ↔ arData alignment when the spray reclaims the freed bin-320 slot</text>
  <text x="470" y="40" text-anchor="middle" class="lbl">All offsets are measured from the same address: the allocation's start = old HT_GET_DATA_ADDR = new spray base</text>

  <!-- Scale: 2.5 px / byte. 320 bytes → 800 px. Left margin 80, right margin 60 -->

  <!-- Top-row label -->
  <text x="70" y="98" text-anchor="end" class="h2">arData:</text>

  <!-- arData boxes -->
  <g transform="translate(80, 80)">
    <!-- hash index: 0x00 - 0x40, width 160 -->
    <rect x="0" y="0" width="160" height="40" fill="#e3f2fd" stroke="#1565c0"/>
    <text x="80" y="18" text-anchor="middle" class="fld">hash index</text>
    <text x="80" y="32" text-anchor="middle" class="lbl">64 B = 2·nTableSize</text>

    <!-- 8 buckets, each 80 px (32 B) -->
    <rect x="160" y="0" width="80" height="40" fill="#fff3e0" stroke="#c66"/>
    <text x="200" y="18" text-anchor="middle" class="fld">bkt[0]</text>
    <text x="200" y="32" text-anchor="middle" class="lbl">p0</text>

    <rect x="240" y="0" width="80" height="40" fill="#fff3e0" stroke="#444"/>
    <text x="280" y="18" text-anchor="middle" class="fld">bkt[1]</text>
    <text x="280" y="32" text-anchor="middle" class="lbl">p1</text>

    <rect x="320" y="0" width="80" height="40" fill="#fff3e0" stroke="#444"/>
    <text x="360" y="18" text-anchor="middle" class="fld">bkt[2]</text>
    <text x="360" y="32" text-anchor="middle" class="lbl">p2</text>

    <rect x="400" y="0" width="80" height="40" fill="#fff3e0" stroke="#444"/>
    <text x="440" y="18" text-anchor="middle" class="fld">bkt[3]</text>
    <text x="440" y="32" text-anchor="middle" class="lbl">p3</text>

    <rect x="480" y="0" width="80" height="40" fill="#fff3e0" stroke="#444"/>
    <text x="520" y="18" text-anchor="middle" class="fld">bkt[4]</text>
    <text x="520" y="32" text-anchor="middle" class="lbl">p4</text>

    <rect x="560" y="0" width="80" height="40" fill="#fff3e0" stroke="#444"/>
    <text x="600" y="18" text-anchor="middle" class="fld">bkt[5]</text>
    <text x="600" y="32" text-anchor="middle" class="lbl">p5</text>

    <rect x="640" y="0" width="80" height="40" fill="#fff3e0" stroke="#444"/>
    <text x="680" y="18" text-anchor="middle" class="fld">bkt[6]</text>
    <text x="680" y="32" text-anchor="middle" class="lbl">p6</text>

    <rect x="720" y="0" width="80" height="40" fill="#fff3e0" stroke="#444"/>
    <text x="760" y="18" text-anchor="middle" class="fld">bkt[7]</text>
    <text x="760" y="32" text-anchor="middle" class="lbl">p7</text>
  </g>

  <!-- Address ruler between the two rows -->
  <g transform="translate(80, 138)">
    <line x1="0" y1="0" x2="800" y2="0" stroke="#888"/>
    <!-- ticks: 0x00, 0x18, 0x40, 0x60, 0x80, 0xA0, 0xC0, 0xE0, 0x100, 0x120, 0x140 -->
    <line x1="0"   y1="-4" x2="0"   y2="4" stroke="#666"/>
    <text x="0"   y="-8" text-anchor="middle" class="off">+0x00</text>

    <line x1="60"  y1="-4" x2="60"  y2="4" stroke="#666"/>
    <text x="60"  y="-8" text-anchor="middle" class="off">+0x18</text>

    <line x1="160" y1="-6" x2="160" y2="6" stroke="#5e35b1" stroke-width="1.5"/>
    <text x="160" y="-8" text-anchor="middle" class="keyoff">+0x40</text>

    <line x1="240" y1="-4" x2="240" y2="4" stroke="#666"/>
    <text x="240" y="-8" text-anchor="middle" class="off">+0x60</text>

    <line x1="320" y1="-4" x2="320" y2="4" stroke="#666"/>
    <text x="320" y="-8" text-anchor="middle" class="off">+0x80</text>

    <line x1="400" y1="-4" x2="400" y2="4" stroke="#666"/>
    <text x="400" y="-8" text-anchor="middle" class="off">+0xA0</text>

    <line x1="480" y1="-4" x2="480" y2="4" stroke="#666"/>
    <text x="480" y="-8" text-anchor="middle" class="off">+0xC0</text>

    <line x1="560" y1="-4" x2="560" y2="4" stroke="#666"/>
    <text x="560" y="-8" text-anchor="middle" class="off">+0xE0</text>

    <line x1="640" y1="-4" x2="640" y2="4" stroke="#666"/>
    <text x="640" y="-8" text-anchor="middle" class="off">+0x100</text>

    <line x1="720" y1="-4" x2="720" y2="4" stroke="#666"/>
    <text x="720" y="-8" text-anchor="middle" class="off">+0x120</text>

    <line x1="800" y1="-4" x2="800" y2="4" stroke="#666"/>
    <text x="800" y="-8" text-anchor="middle" class="off">+0x140</text>

    <!-- ruler labels below -->
    <text x="0"   y="18" text-anchor="middle" class="off">0</text>
    <text x="60"  y="18" text-anchor="middle" class="off">24</text>
    <text x="160" y="18" text-anchor="middle" class="keyoff">64</text>
    <text x="800" y="18" text-anchor="middle" class="off">320</text>
  </g>

  <!-- Bottom-row label -->
  <text x="70" y="180" text-anchor="end" class="h2">spray:</text>

  <!-- spray boxes -->
  <g transform="translate(80, 162)">
    <!-- zend_string header: 0x00 - 0x18, width 60 -->
    <rect x="0" y="0" width="60" height="40" fill="#f3e5f5" stroke="#7b1fa2"/>
    <text x="30" y="18" text-anchor="middle" class="fld">header</text>
    <text x="30" y="32" text-anchor="middle" class="lbl">24 B</text>

    <!-- val[] from 0x18 to 0x130 (280 bytes) → starts at 60, width 700 -->
    <!-- We split val[] into "fills hash-index region" (60..160) and "fills buckets" (160..760) -->
    <rect x="60"  y="0" width="100" height="40" fill="#fce4ec" stroke="#7b1fa2"/>
    <text x="110" y="18" text-anchor="middle" class="fld">val[0..0x28]</text>
    <text x="110" y="32" text-anchor="middle" class="lbl">→ hash index</text>

    <rect x="160" y="0" width="600" height="40" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="460" y="18" text-anchor="middle" class="fld">val[0x28..0x118]  →  overlays the 8 buckets, 32 B each</text>
    <text x="460" y="32" text-anchor="middle" class="lbl">val offset 0x28 = bucket[0],  +0x48 = bucket[1],  +0x68 = bucket[2],  ...,  +0x108 = bucket[7]</text>
  </g>

  <!-- vertical alignment guide at allocation+0x40 (= x=240 because of the 80px left margin: 80 + 0x40*2.5 = 80 + 160 = 240) -->
  <line x1="240" y1="62" x2="240" y2="210" stroke="#5e35b1" stroke-width="1" stroke-dasharray="4 3" opacity="0.7"/>
</svg>
